<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg1:#1c1208;
--bg2:#2e1b0f;
--gold:#c6a15b;
--glass:rgba(255,255,255,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:white;
overflow-x:hidden;
}

/* INTRO */
#intro{
position:fixed;inset:0;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
z-index:2000;transition:opacity 1s ease;
}
#intro h1{
font-size:70px;color:var(--gold);
opacity:0;transform:scale(0.9);
animation:fadeIn 1.5s forwards;
}
#intro p{margin-top:10px;opacity:0;animation:fadeIn 1.5s 0.8s forwards;}
@keyframes fadeIn{to{opacity:1;transform:scale(1);}}

/* NAV */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:center;gap:30px;
padding:15px;background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);z-index:1000;
}
nav button{
background:none;border:none;
color:var(--gold);font-weight:500;cursor:pointer;
}

/* CALENDAR BUTTON */
#calendarBtn{
position:fixed;
top:20px;
right:20px;
background:var(--gold);
color:black;
border:none;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
z-index:1500;
font-weight:600;
}

/* CALENDAR PANEL */
#calendarPopup{
position:fixed;
top:90px;
right:20px;
width:320px;
display:none;
z-index:1500;
}
.calendarGrid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:10px;
}
.calendarCell{
padding:8px;
text-align:center;
background:rgba(255,255,255,0.05);
border-radius:6px;
font-size:12px;
}
.todayCell{
background:var(--gold);
color:black;
}

/* SECTIONS */
section{
min-height:100vh;
padding:100px 20px 80px;
display:none;
}
section.active{display:block;}

.glass{
background:var(--glass);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:25px;
backdrop-filter:blur(15px);
}

.dashboard-panel{max-width:900px;margin:auto;}

#mainTimer{font-size:45px;margin:15px 0;}
button{
background:var(--gold);border:none;
padding:8px 15px;border-radius:10px;
margin:5px;cursor:pointer;font-weight:500;
}

/* ORIGINAL CALENDAR */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;margin-top:15px;
}
.day{
padding:10px;border-radius:8px;
background:rgba(255,255,255,0.05);
text-align:center;font-size:12px;
}
.day.activeDay{background:var(--gold);color:black;}

/* FLOATING NOTES */
#notesBtn{
position:fixed;right:20px;bottom:20px;
width:60px;height:60px;border-radius:50%;
background:var(--gold);color:black;
display:flex;align-items:center;justify-content:center;
cursor:pointer;z-index:1000;font-weight:bold;
}
#notesPanel{
position:fixed;right:20px;bottom:100px;
width:300px;display:none;
}

/* ABOUT */
#aboutBtn{
position:fixed;
top:20px;
left:20px;
background:transparent;
border:1px solid var(--gold);
color:var(--gold);
padding:10px 18px;
border-radius:30px;
text-decoration:none;
font-weight:500;
transition:0.3s;
z-index:1500;
}
#aboutBtn:hover{
background:var(--gold);
color:black;
}

/* TODO */
.todo-item{display:flex;justify-content:space-between;margin:8px 0;}
.done{text-decoration:line-through;opacity:0.6;}

</style>

</head>
<body>

<div id="intro">
<h1>FOCUS</h1>
<p id="motivation"></p>
</div>

<nav>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('todo')">To-Do</button>
<button onclick="show('focus')">Focus</button>
</nav>

<button id="calendarBtn" onclick="toggleCalendar()">📅</button>

<div id="calendarPopup" class="glass">
<h3 id="dateText"></h3>
<h2 id="clock"></h2>
<div id="calendarGrid" class="calendarGrid"></div>
</div>

<section id="dashboard" class="active">
<div class="glass dashboard-panel">
<h2>Study Timer</h2>
<div id="mainTimer">00:00:00</div>
<button onclick="startStudy()">Start</button>
<button onclick="pauseStudy()">Pause</button>
<button onclick="resetAll()">Reset</button>

<hr style="margin:25px 0;opacity:0.2">

<h3>Calendar</h3>
<div id="calendar" class="calendar"></div>

<hr style="margin:25px 0;opacity:0.2">

<h3>Analytics</h3>
<p>Today: <span id="todayTotal">0</span> hrs</p>
<p>All Time: <span id="allTotal">0</span> hrs</p>
</div>
</section>

<section id="todo">
<div class="glass dashboard-panel">
<h2>To-Do</h2>
<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add</button>
<div id="taskList"></div>
</div>
</section>

<section id="focus">
<div class="glass dashboard-panel">
<h2>Stopwatch</h2>
<div id="stopwatch">00:00:00</div>
<button onclick="startSW()">Start</button>
<button onclick="pauseSW()">Pause</button>
<button onclick="resetSW()">Reset</button>

<hr style="margin:25px 0;opacity:0.2">

<h2>Pomodoro (25:00)</h2>
<div id="pomo">25:00</div>
<button onclick="startPomo()">Start</button>
<button onclick="resetPomo()">Reset</button>
</div>
</section>

<div id="notesBtn" onclick="toggleNotes()">📝</div>
<div id="notesPanel" class="glass">
<textarea id="noteArea" rows="8" style="width:100%"></textarea>
</div>

<a id="aboutBtn" href="https://portfolio-erenn.vercel.app" target="_blank">
About Eren
</a>

<script>

/* INTRO */
const quotes=[
"Discipline creates freedom.",
"Focus beats motivation.",
"Outwork yesterday.",
"Small progress daily.",
"Stay sharp."
];
document.getElementById("motivation").innerText=
quotes[Math.floor(Math.random()*quotes.length)];

setTimeout(()=>{
document.getElementById("intro").style.opacity="0";
setTimeout(()=>{document.getElementById("intro").style.display="none"},1000);
},2500);

/* NAV */
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* CALENDAR POPUP CLOCK */
function toggleCalendar(){
let p=document.getElementById("calendarPopup");
p.style.display=p.style.display==="block"?"none":"block";
buildPopupCalendar();
}

function updateClock(){
let now=new Date();

let days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
let months=["January","February","March","April","May","June","July","August","September","October","November","December"];

document.getElementById("dateText").innerText=
days[now.getDay()]+", "+now.getDate()+" "+months[now.getMonth()]+" "+now.getFullYear();

let h=String(now.getHours()).padStart(2,"0");
let m=String(now.getMinutes()).padStart(2,"0");
let s=String(now.getSeconds()).padStart(2,"0");

document.getElementById("clock").innerText=h+":"+m+":"+s;
}

setInterval(updateClock,1000);
updateClock();

function buildPopupCalendar(){
let grid=document.getElementById("calendarGrid");
grid.innerHTML="";

let now=new Date();
let year=now.getFullYear();
let month=now.getMonth();

let firstDay=new Date(year,month,1).getDay();
let daysInMonth=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
let empty=document.createElement("div");
grid.appendChild(empty);
}

for(let d=1;d<=daysInMonth;d++){
let div=document.createElement("div");
div.className="calendarCell";
div.innerText=d;

if(d===now.getDate()){
div.classList.add("todayCell");
}

grid.appendChild(div);
}
}

</script>

</body>
</html>
